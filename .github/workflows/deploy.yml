name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          BRANCH_NAME: main
          RUN_DB_MIGRATIONS: ${{ vars.RUN_DB_MIGRATIONS || 'true' }}
          BACKUP_DIR: ${{ vars.DB_BACKUP_DIR || '' }}
          RETENTION_DAYS: ${{ vars.DB_BACKUP_RETENTION_DAYS || '7' }}
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || '' }}
          MOMO_PARTNER_CODE: ${{ secrets.MOMO_PARTNER_CODE }}
          MOMO_ACCESS_KEY: ${{ secrets.MOMO_ACCESS_KEY }}
          MOMO_SECRET_KEY: ${{ secrets.MOMO_SECRET_KEY }}
          MOMO_IPN_URL: ${{ secrets.MOMO_IPN_URL }}
          MOMO_REDIRECT_URL: ${{ secrets.MOMO_REDIRECT_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,PM2_APP_NAME,BRANCH_NAME,RUN_DB_MIGRATIONS,BACKUP_DIR,RETENTION_DAYS,HEALTHCHECK_URL,MOMO_PARTNER_CODE,MOMO_ACCESS_KEY,MOMO_SECRET_KEY,MOMO_IPN_URL,MOMO_REDIRECT_URL
          command_timeout: 30m
          script: |
            set -e
            cd "$APP_DIR"
            git reset --hard HEAD
            git clean -fd -e .env -e .env.* -e backups/ -e uploads/
            git fetch origin "$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git pull --ff-only origin "$BRANCH_NAME"
            : "${MOMO_PARTNER_CODE:?MOMO_PARTNER_CODE secret is required}"
            : "${MOMO_ACCESS_KEY:?MOMO_ACCESS_KEY secret is required}"
            : "${MOMO_SECRET_KEY:?MOMO_SECRET_KEY secret is required}"
            : "${MOMO_IPN_URL:?MOMO_IPN_URL secret is required}"
            : "${MOMO_REDIRECT_URL:?MOMO_REDIRECT_URL secret is required}"

            if [ ! -f ".env" ]; then
              echo "Missing .env on server. Keep DATABASE_URL and JWT_SECRET in the server .env first."
              exit 1
            fi

            ENV_TMP="$(mktemp)"
            grep -v -E '^(MOMO_ENDPOINT|MOMO_PARTNER_CODE|MOMO_ACCESS_KEY|MOMO_SECRET_KEY|MOMO_IPN_URL|MOMO_REDIRECT_URL|PAYMENT_HOLD_MINUTES)=' .env > "$ENV_TMP" || true
            {
              cat "$ENV_TMP"
              printf '%s\n' "MOMO_ENDPOINT=https://test-payment.momo.vn/v2/gateway/api/create"
              printf '%s\n' "MOMO_PARTNER_CODE=$MOMO_PARTNER_CODE"
              printf '%s\n' "MOMO_ACCESS_KEY=$MOMO_ACCESS_KEY"
              printf '%s\n' "MOMO_SECRET_KEY=$MOMO_SECRET_KEY"
              printf '%s\n' "MOMO_IPN_URL=$MOMO_IPN_URL"
              printf '%s\n' "MOMO_REDIRECT_URL=$MOMO_REDIRECT_URL"
              printf '%s\n' "PAYMENT_HOLD_MINUTES=10"
            } > .env
            rm -f "$ENV_TMP"
            chmod +x scripts/deploy.sh
            SKIP_GIT_SYNC=true ./scripts/deploy.sh
