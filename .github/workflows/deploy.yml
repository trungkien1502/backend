name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          BRANCH_NAME: main
          RUN_DB_MIGRATIONS: ${{ vars.RUN_DB_MIGRATIONS || 'false' }}
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || '' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,PM2_APP_NAME,BRANCH_NAME,RUN_DB_MIGRATIONS,HEALTHCHECK_URL
          command_timeout: 30m
          script: |
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
