name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          BRANCH_NAME: main
          RUN_DB_MIGRATIONS: ${{ vars.RUN_DB_MIGRATIONS || 'true' }}
          BACKUP_DIR: ${{ vars.DB_BACKUP_DIR || '' }}
          RETENTION_DAYS: ${{ vars.DB_BACKUP_RETENTION_DAYS || '7' }}
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || '' }}
          DEPLOY_ADMIN_PANEL: ${{ vars.DEPLOY_ADMIN_PANEL || 'true' }}
          ADMIN_PANEL_WEB_ROOT: ${{ vars.ADMIN_PANEL_WEB_ROOT || '/var/www/admin-panel' }}
          ADMIN_API_URL: ${{ vars.ADMIN_API_URL || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          MOMO_PARTNER_CODE: ${{ secrets.MOMO_PARTNER_CODE }}
          MOMO_ACCESS_KEY: ${{ secrets.MOMO_ACCESS_KEY }}
          MOMO_SECRET_KEY: ${{ secrets.MOMO_SECRET_KEY }}
          MOMO_IPN_URL: ${{ secrets.MOMO_IPN_URL }}
          MOMO_REDIRECT_URL: ${{ secrets.MOMO_REDIRECT_URL }}
          APP_PAYMENT_RETURN_URL: ${{ secrets.APP_PAYMENT_RETURN_URL || vars.APP_PAYMENT_RETURN_URL || '' }}
          VNPAY_PAYMENT_URL: ${{ vars.VNPAY_PAYMENT_URL || 'https://sandbox.vnpayment.vn/paymentv2/vpcpay.html' }}
          VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          VNPAY_RETURN_URL: ${{ secrets.VNPAY_RETURN_URL }}
          PAYMENT_HOLD_MINUTES: ${{ vars.PAYMENT_HOLD_MINUTES || secrets.PAYMENT_HOLD_MINUTES || '10' }}
          MOMO_RETURN_WAIT_ATTEMPTS: ${{ vars.MOMO_RETURN_WAIT_ATTEMPTS || secrets.MOMO_RETURN_WAIT_ATTEMPTS || '6' }}
          MOMO_RETURN_WAIT_DELAY_MS: ${{ vars.MOMO_RETURN_WAIT_DELAY_MS || secrets.MOMO_RETURN_WAIT_DELAY_MS || '500' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || secrets.SMTP_USER }}
          APP_NAME: ${{ secrets.APP_NAME || 'Cinema' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,PM2_APP_NAME,BRANCH_NAME,RUN_DB_MIGRATIONS,BACKUP_DIR,RETENTION_DAYS,HEALTHCHECK_URL,DEPLOY_ADMIN_PANEL,ADMIN_PANEL_WEB_ROOT,ADMIN_API_URL,DATABASE_URL,JWT_SECRET,FRONTEND_URL,MOMO_PARTNER_CODE,MOMO_ACCESS_KEY,MOMO_SECRET_KEY,MOMO_IPN_URL,MOMO_REDIRECT_URL,APP_PAYMENT_RETURN_URL,VNPAY_PAYMENT_URL,VNPAY_TMN_CODE,VNPAY_HASH_SECRET,VNPAY_RETURN_URL,PAYMENT_HOLD_MINUTES,MOMO_RETURN_WAIT_ATTEMPTS,MOMO_RETURN_WAIT_DELAY_MS,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASS,MAIL_FROM,APP_NAME
          command_timeout: 30m
          script: |
            set -e
            cd "$APP_DIR"
            git reset --hard HEAD
            git clean -fd -e .env -e .env.* -e backups/ -e uploads/
            git fetch origin "$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git pull --ff-only origin "$BRANCH_NAME"
            : "${DATABASE_URL:?DATABASE_URL secret is required}"
            : "${JWT_SECRET:?JWT_SECRET secret is required}"
            MOMO_IPN_URL="${MOMO_IPN_URL:-${FRONTEND_URL%/}/api/payments/momo/ipn}"
            MOMO_REDIRECT_URL="${MOMO_REDIRECT_URL:-${FRONTEND_URL%/}/api/payments/momo/return}"
            APP_PAYMENT_RETURN_URL="${APP_PAYMENT_RETURN_URL:-uitcinema://payment/momo-return}"
            VNPAY_RETURN_URL="${VNPAY_RETURN_URL:-${FRONTEND_URL%/}/api/payments/vnpay/return}"
            {
              printf '%s\n' "PORT=8080"
              printf '%s\n' "DATABASE_URL=$DATABASE_URL"
              printf '%s\n' "JWT_SECRET=$JWT_SECRET"
              printf '%s\n' "FRONTEND_URL=$FRONTEND_URL"
              printf '%s\n' "MOMO_ENDPOINT=https://test-payment.momo.vn/v2/gateway/api/create"
              printf '%s\n' "MOMO_PARTNER_CODE=$MOMO_PARTNER_CODE"
              printf '%s\n' "MOMO_ACCESS_KEY=$MOMO_ACCESS_KEY"
              printf '%s\n' "MOMO_SECRET_KEY=$MOMO_SECRET_KEY"
              printf '%s\n' "MOMO_IPN_URL=$MOMO_IPN_URL"
              printf '%s\n' "MOMO_REDIRECT_URL=$MOMO_REDIRECT_URL"
              printf '%s\n' "APP_PAYMENT_RETURN_URL=$APP_PAYMENT_RETURN_URL"
              printf '%s\n' "VNPAY_PAYMENT_URL=$VNPAY_PAYMENT_URL"
              printf '%s\n' "VNPAY_TMN_CODE=$VNPAY_TMN_CODE"
              printf '%s\n' "VNPAY_HASH_SECRET=$VNPAY_HASH_SECRET"
              printf '%s\n' "VNPAY_RETURN_URL=$VNPAY_RETURN_URL"
              printf '%s\n' "PAYMENT_HOLD_MINUTES=$PAYMENT_HOLD_MINUTES"
              printf '%s\n' "MOMO_RETURN_WAIT_ATTEMPTS=$MOMO_RETURN_WAIT_ATTEMPTS"
              printf '%s\n' "MOMO_RETURN_WAIT_DELAY_MS=$MOMO_RETURN_WAIT_DELAY_MS"
              printf '%s\n' "SMTP_HOST=$SMTP_HOST"
              printf '%s\n' "SMTP_PORT=$SMTP_PORT"
              printf '%s\n' "SMTP_SECURE=$SMTP_SECURE"
              printf '%s\n' "SMTP_USER=$SMTP_USER"
              printf '%s\n' "SMTP_PASS=$SMTP_PASS"
              printf '%s\n' "MAIL_FROM=$MAIL_FROM"
              printf '%s\n' "APP_NAME=$APP_NAME"
            } > .env

            chmod +x scripts/deploy.sh
            SKIP_GIT_SYNC=true ./scripts/deploy.sh
